<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Obras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                <section class="card shadow-sm simple-card fade-in">
                    <div class="card-body p-4">
                        <h1 class="h3 mb-2">Cadastro de Obras</h1>
                        <p class="text-secondary mb-4">Formulario basico para cadastrar obras.</p>

                        <form id="artworkForm" novalidate>
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome da obra</label>
                                <input type="text" class="form-control" id="nome" name="nome" required>
                            </div>

                            <div class="mb-3">
                                <label for="ano" class="form-label">Ano</label>
                                <input type="number" class="form-control" id="ano" name="ano" min="0" max="9999" required>
                            </div>

                            <div class="mb-3">
                                <label for="autor" class="form-label">Autor</label>
                                <input type="text" class="form-control" id="autor" name="autor" required>
                            </div>

                            <div class="mb-3">
                                <label for="museu" class="form-label">Museu</label>
                                <input type="text" class="form-control" id="museu" name="museu" required>
                            </div>

                            <div class="mb-3">
                                <label for="arquivo" class="form-label">Arquivo</label>
                                <input type="file" class="form-control" id="arquivo" name="arquivo">
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Salvar</button>
                                <button type="reset" class="btn btn-secondary">Limpar</button>
                            </div>
                        </form>

                        <div id="successAlert" class="alert alert-success mt-4 d-none" role="alert">
                            Cadastro salvo com sucesso.
                        </div>

                        <div class="mt-4">
                            <h2 class="h5 mb-3">Cadastros</h2>
                            <div id="emptyState" class="text-secondary">Nenhum cadastro.</div>
                            <ul id="artworkList" class="list-group"></ul>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
